name: CI/CD

on:
  push:
    branches:
      - main
      - doubao
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.7"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile Python sources
        run: python -m compileall program

      - name: Smoke test core modules
        run: |
          python -c "import os, sys; sys.path.insert(0, os.path.abspath('program')); import src.colors, src.functions, src.image_export, src.layout, src.plot_setup, src.plotter, src.utils; print('Core modules imported successfully.')"

  cd:
    name: CD
    needs: ci
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Package application
        run: |
          mkdir -p dist/xplot
          cp -r program dist/xplot/
          cp requirements.txt README.md sample_data.csv test_missing_values_valid.csv dist/xplot/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: xplot-build
          path: dist/xplot
          if-no-files-found: error
